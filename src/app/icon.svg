<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284C7" />
      <stop offset="100%" stop-color="#0369A1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)" />
  
  <!-- Robot Head Outline -->
  <rect x="20" y="30" width="60" height="45" rx="12" fill="none" stroke="url(#stroke)" stroke-width="5" />
  
  <!-- Antenna -->
  <line x1="50" y1="30" x2="50" y2="15" stroke="url(#stroke)" stroke-width="5" stroke-linecap="round" />
  <circle cx="50" cy="12" r="5" fill="#0284C7" />
  
  <!-- Eyes -->
  <circle cx="35" cy="48" r="5" fill="#0284C7" />
  <circle cx="65" cy="48" r="5" fill="#0284C7" />
  
  <!-- Smile -->
  <path d="M 40 60 Q 50 68 60 60" fill="none" stroke="#0284C7" stroke-width="4" stroke-linecap="round" />
</svg>
